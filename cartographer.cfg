[gcode_macro _CARTOGRAPHER_VARIABLES]
# you can set this to False to not do touch
variable_touch_mode: True
# whether we need to verify K1 specific cartographer firmware is being used
# this will be set to False by the RPI installer
variable_verify_firmware: True
gcode:

[mcu cartographer]
is_non_critical: true
# if non critical mcu enabled and probe disconnects and then reconnects (physically) do not reattach to klipper upon that reconnect to avoid crashing klipper
no_reconnect: true
serial: /dev/serial/by-id/usb-Cartographer_614e_20000A001943303854303720-if00
restart_method: command

[cartographer]
mcu: cartographer
x_offset: 0.0
y_offset: 16.86
verbose: no
macro_prefix: CARTO

[cartographer scan]
mesh_runs: 2

# if you want to only do scan, disable this section
[cartographer touch]
max_samples: 30
sample_range: 0.01
EXPERIMENTAL_home_random_radius: 5.0
samples: 4
max_noisy_samples: 2
retract_distance: 5
unsafe_max_touch_temperature: 200

[temperature_sensor cartographer_mcu]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 0
# Cartographer V3 has a maximum operating temperature of 85°C, whereas the V4 is rated for operation up to 125°C. However, the integrated ADXL accelerometer remains rated for a maximum of 85°C.
max_temp: 105

[bed_mesh]
horizontal_move_z: 3
# anything above 200 on a K1 series printer is likely to cause stuttering
speed: 200
mesh_min: 10,17
mesh_max: 210,200
probe_count: 21,21
algorithm: bicubic
bicubic_tension: 0.1
mesh_pps: 0,0
adaptive_margin: 5.0
zero_reference_position: 114,113

[screws_tilt_adjust]
screw1: 25,3
screw1_name: front left screw
screw2: 195,3
screw2_name: front right screw
screw3: 195,173
screw3_name: rear right screw
screw4: 25,173
screw4_name: rear left screw
speed: 50
horizontal_move_z: 5
screw_thread: CW-M4

# this excessive config (the 999) is intentional, we pass `USE_TOUCH_BOUNDARIES=1` to
# do axis twist compensation
[axis_twist_compensation]
speed: 50
horizontal_move_z: 5
calibrate_start_x: 999
calibrate_end_x: 999
calibrate_y: 999
